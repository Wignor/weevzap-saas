<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WeevZap</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #020617, #000);
  font-family: Inter;
  color:white;
}

.card {
  background:#020617;
  padding:40px;
  border-radius:20px;
  width:340px;
  box-shadow:0 0 60px rgba(0,255,150,0.15);
  text-align:center;
  border:1px solid #0f172a;
}

.logo {
  font-family:Orbitron;
  font-size:30px;
  color:#00ff9f;
  margin-bottom:5px;
}

.sub {
  font-size:12px;
  color:#64748b;
  margin-bottom:25px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
  outline:none;
}

input:focus {
  border:1px solid #00ff9f;
}

.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00ff9f,#00c3ff);
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

.btn:hover {
  transform:scale(1.02);
  opacity:0.9;
}

.btn-secondary {
  background:#0f172a;
  color:#94a3b8;
  border:1px solid #1e293b;
}

.msg {
  margin-top:15px;
  font-size:13px;
  min-height:18px;
}

.success {
  color:#22c55e;
}

.error {
  color:#ef4444;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">WeevZap 🚀</div>
  <div class="sub">Automação inteligente via WhatsApp</div>

  <input id="name" placeholder="Nome">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">

  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn btn-secondary" onclick="register()">Criar Conta</button>

  <div class="msg" id="msg"></div>
</div>

<script>

function showMsg(text, type="success"){
  const msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = "msg " + type;
}

async function register(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!name || !email || !password){
    return showMsg("Preencha todos os campos", "error");
  }

  const res = await fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,email,password})
  });

  const data = await res.json();

  if(data.error){
    showMsg(data.error, "error");
  } else {
    showMsg("Conta criada com sucesso! Agora faça login.", "success");
  }
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    return showMsg("Preencha email e senha", "error");
  }

  const res = await fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data = await res.json();

  if(data.error){
    showMsg(data.error, "error");
  } else {
    // 🔥 ESSENCIAL PRA O DASHBOARD FUNCIONAR
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    showMsg("Login realizado!", "success");

    setTimeout(() => {
      window.location.href = "/dashboard";
    }, 800);
  }
}

</script>

</body>
</html>
