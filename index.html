<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WeevZap</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #020617, #000);
  font-family: Inter;
  color:white;
}

.card {
  background:#020617;
  padding:40px;
  border-radius:20px;
  width:320px;
  box-shadow:0 0 40px rgba(0,255,150,0.1);
  text-align:center;
}

.logo {
  font-family:Orbitron;
  font-size:28px;
  color:#00ff9f;
  margin-bottom:10px;
}

.sub {
  font-size:12px;
  color:#64748b;
  margin-bottom:25px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00ff9f,#00c3ff);
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover {
  opacity:0.9;
}

.msg {
  margin-top:15px;
  font-size:13px;
  color:#22c55e;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">WeevZap 🚀</div>
  <div class="sub">Automação inteligente via WhatsApp</div>

  <input id="name" placeholder="Nome">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">

  <button onclick="register()">Criar Conta</button>
  <button onclick="login()">Entrar</button>

  <div class="msg" id="msg"></div>
</div>

<script>

async function register(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,email,password})
  });

  const data = await res.json();

  if(data.error){
    document.getElementById("msg").innerText = data.error;
  } else {
    document.getElementById("msg").innerText = "Conta criada! Verifique seu email.";
  }
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data = await res.json();

  if(data.error){
    document.getElementById("msg").innerText = data.error;
  } else {
    localStorage.setItem("token", data.token);
    window.location.href = "/dashboard";
  }
}

</script>

</body>
</html>
