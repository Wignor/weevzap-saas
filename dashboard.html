<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WeevZap Painel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  display:flex;
  height:100vh;
  background: radial-gradient(circle at top, #020617, #000);
  color:white;
  font-family:Inter;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:25px;
}

.logo {
  font-family:Orbitron;
  color:#00ff9f;
  font-size:22px;
  margin-bottom:40px;
}

.menu div {
  padding:12px;
  margin-bottom:10px;
  cursor:pointer;
  border-radius:10px;
  transition:0.2s;
}

.menu div:hover {
  background:#0f172a;
}

/* CONTENT */
.content {
  flex:1;
  padding:40px;
}

/* CARD */
.card {
  background:#0f172a;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
  box-shadow:0 0 30px rgba(0,255,150,0.05);
}

/* BUTTON */
button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00ff9f,#00c3ff);
  cursor:pointer;
  margin-top:15px;
  width:100%;
  font-weight:bold;
}

button:hover {
  opacity:0.9;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#020617;
  border:1px solid #1e293b;
  color:white;
  border-radius:10px;
}

/* STATUS */
.status-ok {
  color:#22c55e;
}

.status-off {
  color:#ef4444;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">WeevZap 🚀</div>
  <div class="menu">
    <div>Dashboard</div>
    <div>WhatsApp</div>
    <div>Integrações</div>
  </div>
</div>

<div class="content">

  <!-- STATUS -->
  <div class="card">
    <h2>Status</h2>
    <p id="status">WhatsApp: <span class="status-off">Desconectado</span></p>
    <button onclick="connectWhats()">Conectar WhatsApp</button>
  </div>

  <!-- INTEGRAÇÕES -->
  <div class="card">
    <h2>Integrações</h2>

    <input id="evo_url" placeholder="URL Evolution API">
    <input id="evo_key" placeholder="API Key Evolution">

    <input id="n8n" placeholder="Webhook n8n">
    <input id="openai" placeholder="OpenAI API Key">
    <input id="assistant" placeholder="Assistant ID OpenAI">

    <button onclick="saveIntegrations()">Salvar Integrações</button>
  </div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/";
}

// 🚀 CONECTAR WHATS
async function connectWhats(){
  const res = await fetch("/connect-whatsapp", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ user_id: user.id })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
  } else {
    document.getElementById("status").innerHTML =
      'WhatsApp: <span class="status-ok">Conectado (escaneie QR no Evolution)</span>';

    alert("Instância criada! Vá no Evolution e escaneie o QR Code.");
  }
}

// 💾 SALVAR INTEGRAÇÕES
async function saveIntegrations(){
  const res = await fetch("/save-integrations", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id: user.id,
      evolution_url: document.getElementById("evo_url").value,
      evolution_key: document.getElementById("evo_key").value,
      n8n_webhook: document.getElementById("n8n").value,
      openai_key: document.getElementById("openai").value,
      assistant_id: document.getElementById("assistant").value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
  } else {
    alert("Integrações salvas com sucesso!");
  }
}

</script>

</body>
</html>
